<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실습 5 - 방명록</title>
  <style>
    body { font-family: sans-serif; background: #F9FAFB; color: #1F2937; }
    main { max-width: 560px; margin: 40px auto; padding: 0 16px; }
    .form-card { background: #FFF; border: 1px solid #E5E7EB; border-radius: 12px; padding: 20px; }
    input { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #E5E7EB;
            border-radius: 8px; box-sizing: border-box; }
    button { background: #2563EB; color: #FFF; border: none; border-radius: 8px;
             padding: 10px 20px; cursor: pointer; }
    li { background: #FFF; border: 1px solid #E5E7EB; border-radius: 8px;
         padding: 12px; margin: 8px 0; list-style: none; }
    .name { font-weight: bold; color: #2563EB; margin-right: 8px; }
    ul { padding: 0; }
  </style>
</head>
<body>
  <main>
    <h1>방명록</h1>

    <div class="form-card">
      <input type="text" id="name-input" placeholder="이름">
      <input type="text" id="message-input" placeholder="한 줄 메시지">
      <button id="submit-btn">남기기</button>
    </div>

    <ul id="guest-list"></ul>
  </main>

  <script>
    const nameInput = document.querySelector("#name-input");
    const messageInput = document.querySelector("#message-input");
    const guestList = document.querySelector("#guest-list");

    document.querySelector("#submit-btn").addEventListener("click", function () {
      const name = nameInput.value.trim();
      const message = messageInput.value.trim();

      if (name === "" || message === "") {
        alert("이름과 메시지를 모두 입력해 주세요.");
        return;
      }

      // li 안에 이름(span)과 메시지를 함께 구성
      const li = document.createElement("li");
      const nameSpan = document.createElement("span");
      nameSpan.className = "name";
      nameSpan.textContent = name;

      li.appendChild(nameSpan);
      li.appendChild(document.createTextNode(message));
      guestList.prepend(li); // 최신 글이 위로

      nameInput.value = "";
      messageInput.value = "";
      nameInput.focus();
    });
  </script>
</body>
</html>
