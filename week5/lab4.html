<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>실습 4 - 동적 목록</title>
</head>
<body>
  <h1>항목 추가와 삭제</h1>
  <p>추가 버튼으로 항목을 만들고, 항목을 클릭하면 삭제됩니다.</p>

  <input type="text" id="item-input" placeholder="항목 이름">
  <button id="add-btn">추가</button>

  <ul id="item-list"></ul>

  <script>
    const input = document.querySelector("#item-input");
    const list = document.querySelector("#item-list");

    document.querySelector("#add-btn").addEventListener("click", function () {
      if (input.value.trim() === "") return;

      // createElement: 새 요소를 만든다
      const li = document.createElement("li");
      li.textContent = input.value + " (클릭하면 삭제)";

      // 만든 요소에도 이벤트를 붙일 수 있다
      li.addEventListener("click", function () {
        li.remove(); // 자기 자신을 삭제
      });

      list.appendChild(li); // 목록에 붙이기
      input.value = "";
    });
  </script>
</body>
</html>
