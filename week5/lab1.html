<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>실습 1 - 요소 선택과 변경</title>
</head>
<body>
  <h1 id="title">원래 제목입니다</h1>
  <button id="change-btn">제목 바꾸기</button>

  <script>
    // querySelector: CSS 선택자로 요소를 찾는다
    const title = document.querySelector("#title");
    const button = document.querySelector("#change-btn");

    // addEventListener: "클릭되면 이 함수를 실행해라"
    button.addEventListener("click", function () {
      title.textContent = "JavaScript로 바뀐 제목!"; // 글자 변경
      title.style.color = "#2563EB";                 // 스타일 변경
    });
  </script>
</body>
</html>
