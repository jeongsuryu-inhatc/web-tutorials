<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>실습 4 - 학점 판정</title>
</head>
<body>
  <h1>실습 4: 점수에 따른 학점 판정 (콘솔 확인)</h1>

  <script>
    const score = 87;
    let grade;

    // if / else if / else: 위에서부터 차례로 검사한다
    if (score >= 90) {
      grade = "A";
    } else if (score >= 80) {
      grade = "B";
    } else if (score >= 70) {
      grade = "C";
    } else if (score >= 60) {
      grade = "D";
    } else {
      grade = "F";
    }

    console.log(`점수 ${score}점 → 학점 ${grade}`);

    // 도전: score 값을 바꿔가며 결과를 확인해 보세요 (95, 72, 55, ...)
  </script>
</body>
</html>
