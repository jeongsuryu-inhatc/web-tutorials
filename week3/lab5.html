<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>실습 5 - 성인/미성년 판별</title>
</head>
<body>
  <h1>실습 5: 나이 판별</h1>
  <p id="result">페이지를 새로고침하면 나이를 물어봅니다.</p>

  <script>
    // prompt: 사용자에게 입력을 받는다 (문자열로 들어옴)
    const input = prompt("나이를 입력하세요");

    // Number(): 문자열을 숫자로 변환
    const age = Number(input);

    const resultElement = document.getElementById("result");

    if (Number.isNaN(age)) {
      resultElement.textContent = "숫자를 입력해 주세요.";
    } else if (age >= 18) {
      resultElement.textContent = `${age}살은 성인입니다.`;
    } else {
      resultElement.textContent = `${age}살은 미성년자입니다.`;
    }
  </script>
</body>
</html>
