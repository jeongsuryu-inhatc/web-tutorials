<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI 챗봇</title>
  <style>
    /* DESIGN.md 명세 기반: 파란 포인트, 밝은 미니멀 채팅 UI */
    * { box-sizing: border-box; }
    body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
           background: #F9FAFB; color: #1F2937; margin: 0; }
    .app { max-width: 480px; margin: 0 auto; height: 100vh;
           display: flex; flex-direction: column; background: #FFF; }
    header { padding: 16px; border-bottom: 1px solid #E5E7EB;
             display: flex; justify-content: space-between; align-items: center; }
    header strong { color: #2563EB; }
    #progress { font-size: 13px; color: #6B7280; }
    #chat { flex: 1; overflow-y: auto; padding: 16px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 16px;
           margin: 6px 0; line-height: 1.5; white-space: pre-wrap; font-size: 14px; }
    .bot { background: #F3F4F6; border-bottom-left-radius: 4px; }
    .user { background: #2563EB; color: #FFF; margin-left: auto;
            border-bottom-right-radius: 4px; }
    .input-row { display: flex; gap: 8px; padding: 12px 16px;
                 border-top: 1px solid #E5E7EB; }
    #input { flex: 1; padding: 12px; border: 1px solid #E5E7EB;
             border-radius: 24px; outline: none; }
    #send { background: #2563EB; color: #FFF; border: none;
            border-radius: 24px; padding: 0 20px; cursor: pointer; }
    #send:disabled { background: #93C5FD; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <strong>MBTI 챗봇</strong>
      <span id="progress"></span>
    </header>
    <div id="chat"></div>
    <div class="input-row">
      <input type="text" id="input" placeholder="답변을 입력하세요" autocomplete="off">
      <button id="send">전송</button>
    </div>
  </div>

  <script>
    const chat = document.querySelector("#chat");
    const input = document.querySelector("#input");
    const sendBtn = document.querySelector("#send");

    // 대화 이력 (서버로 매번 전체를 보낸다)
    const messages = [];

    function addBubble(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + (role === "user" ? "user" : "bot");
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function updateProgress(text) {
      // 봇 메시지에서 "3/6" 같은 진행 표시를 찾아 헤더에 반영
      const match = text.match(/(\d)\s*\/\s*6/);
      document.querySelector("#progress").textContent =
        match ? `질문 ${match[1]}/6` : "";
    }

    async function callBot() {
      sendBtn.disabled = true;
      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages }),
        });
        const data = await response.json();
        messages.push({ role: "model", text: data.text });
        addBubble("model", data.text);
        updateProgress(data.text);
      } catch (err) {
        addBubble("model", "연결에 실패했습니다. 서버가 켜져 있는지 확인해 주세요.");
      }
      sendBtn.disabled = false;
      input.focus();
    }

    function send() {
      const text = input.value.trim();
      if (text === "" || sendBtn.disabled) return;
      messages.push({ role: "user", text });
      addBubble("user", text);
      input.value = "";
      callBot();
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });

    // 시작: 첫 인사를 요청해 첫 질문을 받는다
    messages.push({ role: "user", text: "MBTI 검사를 시작할게요." });
    addBubble("user", "MBTI 검사를 시작할게요.");
    callBot();
  </script>
</body>
</html>
