<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>example3 — 배경과 꾸미기</title>
  <style>
    .card {
      width: 220px;
      padding: 16px;
      margin: 20px;

      background-color: #fdf6ec; /* 배경색 */
      border-radius: 12px;       /* 모서리를 둥글게 */
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); /* 그림자 */

      display: inline-block; /* 여러 카드를 가로로 배치하기 위함 */
    }

    .card h2 {
      margin-top: 0;
      color: #a0522d;
    }
  </style>
</head>
<body>
  <h1>배경과 꾸미기 연습</h1>

  <div class="card">
    <h2>카드 1</h2>
    <p>둥근 모서리와 그림자가 적용된 카드입니다.</p>
  </div>

  <div class="card">
    <h2>카드 2</h2>
    <p>background-color, border-radius, box-shadow를 함께 사용했습니다.</p>
  </div>
</body>
</html>
