<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>example2 — 박스 모델</title>
  <style>
    /* 박스 모델 순서(안쪽 -> 바깥쪽): content -> padding -> border -> margin */
    .box {
      width: 200px;
      height: 100px;
      background-color: lightblue;

      padding: 20px;   /* 내용과 테두리 사이 여백 */
      border: 4px solid navy; /* 테두리 */
      margin: 30px;    /* 다른 요소와의 바깥 여백 */
    }

    .box-small-padding {
      width: 200px;
      height: 100px;
      background-color: lightgreen;

      padding: 5px;
      border: 4px solid darkgreen;
      margin: 30px;
    }
  </style>
</head>
<body>
  <h1>박스 모델 비교</h1>

  <div class="box">padding: 20px</div>
  <div class="box-small-padding">padding: 5px</div>

  <p>
    두 박스의 width/height는 같지만 padding 값이 달라 실제 보이는
    크기와 내용 위치가 다르게 느껴진다.
  </p>
</body>
</html>
