<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>example4 — Flexbox 레이아웃 기초</title>
  <style>
    .container {
      display: flex;              /* 자식 요소들을 가로로 나란히 배치 */
      justify-content: space-between; /* 가로 방향 배치: 양 끝으로 균등 배분 */
      align-items: center;        /* 세로 방향 배치: 가운데 정렬 */

      height: 150px;
      background-color: #eee;
      padding: 10px;
    }

    .item {
      width: 80px;
      height: 80px;
      background-color: teal;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Flexbox 레이아웃 연습</h1>

  <div class="container">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
  </div>

  <p>
    justify-content 값을 center, flex-start, space-around 등으로
    바꿔가며 배치가 어떻게 달라지는지 확인해 보자.
  </p>
</body>
</html>
