<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>example6 — 종합 실습: 프로필 카드</title>
  <style>
    /* 박스 모델 + Flexbox + 배경/꾸미기 + position을 모두 활용한 카드 */
    .profile-card {
      position: relative;
      width: 260px;
      padding: 20px;
      margin: 30px auto;

      background-color: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 16px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);

      display: flex;
      flex-direction: column; /* 세로 방향으로 쌓기 */
      align-items: center;
      text-align: center;
    }

    .profile-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background-color: #3b82f6;
      color: white;
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 999px;
    }

    .profile-photo {
      width: 90px;
      height: 90px;
      border-radius: 50%; /* 원형 이미지 */
      background-color: #d1d5db;
      margin-bottom: 12px;
    }

    .profile-name {
      margin: 0;
      color: #1f2937;
    }

    .profile-desc {
      color: #6b7280;
      font-size: 14px;
    }

    .profile-button {
      margin-top: 12px;
      padding: 8px 20px;
      background-color: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .profile-button:hover {
      background-color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="profile-card">
    <span class="profile-badge">신입생</span>
    <div class="profile-photo"></div>
    <h2 class="profile-name">홍길동</h2>
    <p class="profile-desc">컴퓨터공학과 1학년, 웹 개발에 관심이 많습니다.</p>
    <button class="profile-button">팔로우</button>
  </div>
</body>
</html>
