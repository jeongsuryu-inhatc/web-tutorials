<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>example4 — 다크모드 토글</title>
  <style>
    body {
      font-family: sans-serif;
      transition: background-color 0.2s, color 0.2s;
    }
    /* dark-mode 클래스가 body에 붙으면 아래 스타일이 적용된다. */
    body.dark-mode {
      background-color: #1e1e1e;
      color: #f5f5f5;
    }
  </style>
</head>
<body>
  <h1>다크모드 토글 예제</h1>
  <p>버튼을 누르면 배경색과 글자색이 바뀝니다.</p>
  <button id="toggleBtn">다크모드 켜기/끄기</button>

  <script>
    const toggleBtn = document.getElementById("toggleBtn");

    toggleBtn.addEventListener("click", () => {
      // classList.toggle: 클래스가 있으면 제거하고, 없으면 추가한다.
      document.body.classList.toggle("dark-mode");
    });
  </script>
</body>
</html>
