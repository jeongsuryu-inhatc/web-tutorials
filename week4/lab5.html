<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>실습 5 - 숫자 맞히기 게임</title>
</head>
<body>
  <h1>실습 5: 숫자 맞히기 게임</h1>
  <p>1~100 사이의 숫자를 맞혀 보세요. 새로고침하면 시작합니다.</p>
  <p id="result"></p>

  <script>
    // 함수 단위로 구조화: 만들기 → 입력 → 판정 → 반복

    // 1) 정답 만들기: 1~100 사이 임의의 정수
    function createAnswer() {
      return Math.floor(Math.random() * 100) + 1;
    }

    // 2) 입력 받기
    function getGuess(message) {
      return Number(prompt(message));
    }

    // 3) 판정하기: "정답" / "UP" / "DOWN" 반환
    function judge(answer, guess) {
      if (guess === answer) return "정답";
      return guess < answer ? "UP" : "DOWN";
    }

    // 4) 게임 진행
    function playGame() {
      const answer = createAnswer();
      let tries = 0;

      while (true) {
        tries++;
        const guess = getGuess(`숫자를 입력하세요 (시도 ${tries}회)`);
        const result = judge(answer, guess);

        if (result === "정답") {
          return `정답! ${answer}을(를) ${tries}번 만에 맞혔습니다.`;
        }
        alert(result); // UP: 더 큰 수, DOWN: 더 작은 수
      }
    }

    document.getElementById("result").textContent = playGame();
  </script>
</body>
</html>
