<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>실습 3 - 배열 처리 함수</title>
</head>
<body>
  <h1>실습 3: 배열 합계·평균·최댓값 (콘솔 확인)</h1>

  <script>
    const numbers = [85, 92, 78, 95, 63];

    // 배열의 합계
    function getSum(arr) {
      let sum = 0;
      for (let i = 0; i < arr.length; i++) {
        sum += arr[i];
      }
      return sum;
    }

    // 평균: 합계를 개수로 나눈다
    function getAverage(arr) {
      return getSum(arr) / arr.length;
    }

    // 최댓값: 첫 값에서 시작해 더 큰 값으로 갱신
    function getMax(arr) {
      let max = arr[0];
      for (const value of arr) {
        if (value > max) {
          max = value;
        }
      }
      return max;
    }

    console.log("배열:", numbers);
    console.log("합계:", getSum(numbers));
    console.log("평균:", getAverage(numbers));
    console.log("최댓값:", getMax(numbers));
  </script>
</body>
</html>
