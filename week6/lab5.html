<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo - 실습 5 (완성본)</title>
  <style>
    body { font-family: sans-serif; background: #F9FAFB; color: #1F2937; }
    main { max-width: 480px; margin: 40px auto; padding: 0 16px; }
    h1 { text-align: center; }
    .input-row { display: flex; gap: 8px; }
    #todo-input { flex: 1; padding: 12px; border: 1px solid #E5E7EB; border-radius: 8px; }
    #add-btn { background: #2563EB; color: #FFF; border: none; border-radius: 8px;
               padding: 0 20px; cursor: pointer; }
    .toolbar { display: flex; justify-content: space-between; align-items: center;
               margin-top: 16px; color: #6B7280; font-size: 14px; }
    #clear-btn { background: none; border: none; color: #DC2626; cursor: pointer; }
    #todo-list { padding: 0; }
    #todo-list li { background: #FFF; border: 1px solid #E5E7EB; border-radius: 8px;
                    padding: 12px; margin: 8px 0; list-style: none;
                    display: flex; align-items: center; gap: 8px; }
    #todo-list li span { flex: 1; }
    .done { text-decoration: line-through; color: #9CA3AF; }
    .delete-btn { background: none; border: none; color: #DC2626; cursor: pointer; }
  </style>
</head>
<body>
  <main>
    <h1>나의 할 일</h1>
    <div class="input-row">
      <input type="text" id="todo-input" placeholder="할 일을 입력하세요">
      <button id="add-btn">추가</button>
    </div>

    <!-- 실습 5에서 추가: 남은 개수 + 전체 삭제 -->
    <div class="toolbar">
      <span id="remaining">남은 할 일 0개</span>
      <button id="clear-btn">전체 삭제</button>
    </div>

    <ul id="todo-list"></ul>
  </main>

  <script>
    const todos = [];
    const input = document.querySelector("#todo-input");
    const listElement = document.querySelector("#todo-list");
    const remainingElement = document.querySelector("#remaining");

    function render() {
      listElement.innerHTML = "";

      todos.forEach(function (todo, index) {
        const li = document.createElement("li");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = todo.done;
        checkbox.addEventListener("change", function () {
          todo.done = !todo.done;
          render();
        });

        const span = document.createElement("span");
        span.textContent = todo.title;
        if (todo.done) span.className = "done";

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-btn";
        deleteBtn.textContent = "삭제";
        deleteBtn.addEventListener("click", function () {
          todos.splice(index, 1);
          render();
        });

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(deleteBtn);
        listElement.appendChild(li);
      });

      // 남은(미완료) 할 일 개수
      const remaining = todos.filter(function (todo) { return !todo.done; }).length;
      remainingElement.textContent = `남은 할 일 ${remaining}개`;
    }

    function addTodo() {
      const title = input.value.trim();
      if (title === "") return;
      todos.push({ title: title, done: false });
      input.value = "";
      render();
    }

    document.querySelector("#add-btn").addEventListener("click", addTodo);
    input.addEventListener("keydown", function (event) {
      if (event.key === "Enter") addTodo();
    });

    // 전체 삭제
    document.querySelector("#clear-btn").addEventListener("click", function () {
      if (todos.length === 0) return;
      if (confirm("정말 전체 삭제할까요?")) {
        todos.length = 0; // 배열 비우기
        render();
      }
    });

    render();
  </script>
</body>
</html>
