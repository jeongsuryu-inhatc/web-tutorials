<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo - 실습 1 (화면 만들기)</title>
  <style>
    /* 2주차에 배운 CSS로 단순하고 깔끔하게 */
    body { font-family: sans-serif; background: #F9FAFB; color: #1F2937; }
    main { max-width: 480px; margin: 40px auto; padding: 0 16px; }
    h1 { text-align: center; }
    .input-row { display: flex; gap: 8px; }
    #todo-input { flex: 1; padding: 12px; border: 1px solid #E5E7EB; border-radius: 8px; }
    #add-btn { background: #2563EB; color: #FFF; border: none; border-radius: 8px;
               padding: 0 20px; cursor: pointer; }
    #todo-list { padding: 0; }
    #todo-list li { background: #FFF; border: 1px solid #E5E7EB; border-radius: 8px;
                    padding: 12px; margin: 8px 0; list-style: none;
                    display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>
  <main>
    <h1>나의 할 일</h1>

    <!-- 입력 영역 -->
    <div class="input-row">
      <input type="text" id="todo-input" placeholder="할 일을 입력하세요">
      <button id="add-btn">추가</button>
    </div>

    <!-- 목록 영역 (아직 예시 마크업, 다음 실습에서 JS로 만든다) -->
    <ul id="todo-list">
      <li>예시 할 일 1 <button>삭제</button></li>
      <li>예시 할 일 2 <button>삭제</button></li>
    </ul>
  </main>
</body>
</html>
